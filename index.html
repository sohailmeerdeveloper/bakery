<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Heavenly Layers — Sales Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
<style>
  :root{
    --bg:#06131f;
    --bg-2:#0a1d2e;
    --paper:#e8edf1;
    --muted:#8a9aa8;
    --rule:rgba(232,237,241,.12);
    --tide:#5cc2d6;
    --tide-2:#3aa5bd;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:"Poppins",sans-serif;
    background:var(--bg);
    color:var(--paper);
    font-weight:400;
    font-size:15px;
    line-height:1.6;
    -webkit-font-smoothing:antialiased;
  }

  /* Nav */
  nav{
    border-bottom:1px solid var(--rule);
    position:sticky;top:0;z-index:50;background:rgba(6,19,31,.85);
    backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  }
  .nav-inner{
    max-width:1180px;margin:0 auto;padding:18px 28px;
    display:flex;align-items:center;justify-content:space-between;gap:20px;
  }
  .brand{font-weight:600;font-size:17px;letter-spacing:-.01em}
  .brand span{color:var(--tide)}
  .nav-links{display:flex;gap:26px}
  .nav-links a{color:var(--muted);text-decoration:none;font-size:14px;transition:color .2s}
  .nav-links a:hover{color:var(--paper)}
  @media(max-width:640px){.nav-links{display:none}.nav-inner{padding:16px 22px}}

  .wrap{max-width:1180px;margin:0 auto;padding:0 28px}
  @media(max-width:640px){.wrap{padding:0 22px}}

  /* Hero */
  header.hero{padding:80px 0 60px;text-align:center}
  header.hero h1{
    font-weight:600;font-size:clamp(40px,6vw,72px);
    letter-spacing:-.025em;line-height:1.05;margin:0;
  }
  header.hero h1 span{color:var(--tide)}
  header.hero p{
    margin:18px auto 0;max-width:560px;color:var(--muted);font-size:16px;
  }

  /* Sections */
  section{padding:60px 0;border-top:1px solid var(--rule)}
  h2{font-weight:600;font-size:clamp(22px,2.8vw,28px);letter-spacing:-.015em;margin:0 0 26px}

  /* KPI cards */
  .kpis{display:grid;grid-template-columns:repeat(6,1fr);gap:14px}
  .kpi{
    padding:20px 18px;border:1px solid var(--rule);border-radius:6px;
    background:rgba(10,29,46,.4);
  }
  .kpi .lbl{font-size:12px;color:var(--muted);margin-bottom:10px}
  .kpi .val{font-size:22px;font-weight:600;letter-spacing:-.02em;color:var(--paper);line-height:1.1}
  @media(max-width:980px){.kpis{grid-template-columns:repeat(3,1fr)}}
  @media(max-width:560px){.kpis{grid-template-columns:repeat(2,1fr)}}

  /* Charts */
  .charts{display:grid;grid-template-columns:1.4fr 1fr;gap:20px}
  .panel{
    border:1px solid var(--rule);border-radius:6px;background:rgba(10,29,46,.4);
    padding:24px;
  }
  .panel.wide{grid-column:1 / -1}
  .panel-head{display:flex;justify-content:space-between;align-items:center;gap:14px;margin-bottom:14px}
  .panel-head h3{font-weight:600;font-size:16px;margin:0;letter-spacing:-.01em}
  .chart-host{width:100%;min-height:300px}
  .inspect{
    background:transparent;border:1px solid var(--rule);color:var(--muted);
    font-family:inherit;font-size:13px;padding:7px 14px;border-radius:5px;cursor:pointer;
    transition:.2s;
  }
  .inspect:hover{color:var(--paper);border-color:var(--tide)}
  @media(max-width:880px){.charts{grid-template-columns:1fr}.panel.wide{grid-column:auto}}

  /* Footer */
  footer{
    border-top:1px solid var(--rule);
    margin-top:60px;padding:24px 0;
    text-align:center;color:var(--muted);font-size:13px;
  }

  /* Modal */
  .modal-back{
    position:fixed;inset:0;z-index:200;display:none;align-items:center;justify-content:center;
    background:rgba(3,10,18,.75);backdrop-filter:blur(6px);
    padding:20px;
  }
  .modal-back.open{display:flex}
  .modal{
    width:min(800px,100%);max-height:88vh;overflow:auto;
    background:var(--bg-2);border:1px solid var(--rule);border-radius:6px;
  }
  .modal header{
    position:sticky;top:0;background:var(--bg-2);z-index:2;
    padding:20px 24px 14px;display:flex;justify-content:space-between;align-items:center;
    border-bottom:1px solid var(--rule);
  }
  .modal header h3{font-weight:600;font-size:17px;margin:0}
  .x{background:transparent;border:1px solid var(--rule);color:var(--muted);width:30px;height:30px;border-radius:4px;cursor:pointer;font-size:14px}
  .x:hover{color:var(--paper);border-color:var(--tide)}
  .modal-body{padding:20px 24px 24px}
  .tabs{display:flex;border-bottom:1px solid var(--rule);margin-bottom:18px}
  .tab{
    background:transparent;border:0;color:var(--muted);padding:10px 16px;cursor:pointer;
    font-family:inherit;font-size:13.5px;border-bottom:2px solid transparent;margin-bottom:-1px;
  }
  .tab.active{color:var(--paper);border-bottom-color:var(--tide)}
  .pane{display:none}
  .pane.active{display:block}

  table.data{width:100%;border-collapse:collapse;font-size:13px}
  table.data th,table.data td{padding:9px 10px;text-align:left;border-bottom:1px solid var(--rule)}
  table.data th{font-size:12px;color:var(--muted);font-weight:500}
  table.data td.num{text-align:right;font-variant-numeric:tabular-nums}
  table.data code{color:var(--tide);font-size:12px;background:rgba(92,194,214,.08);padding:2px 6px;border-radius:3px}
  table.data input{
    width:90px;background:rgba(0,0,0,.25);border:1px solid var(--rule);color:var(--paper);
    padding:5px 8px;border-radius:3px;font-family:inherit;font-size:13px;text-align:right;
  }
  table.data input:focus{outline:none;border-color:var(--tide)}
  .formula{
    background:#040d17;border:1px solid var(--rule);border-radius:4px;padding:18px 20px;
    font-family:ui-monospace,Menlo,Consolas,monospace;font-size:13px;color:var(--muted);
    line-height:1.9;white-space:pre-wrap;overflow-x:auto;
  }
  .formula b{color:var(--tide);font-weight:500}
  .formula .res{color:var(--paper)}
  .actions{display:flex;justify-content:space-between;gap:10px;margin-top:18px}
  .btn{
    font-family:inherit;font-size:13px;padding:9px 16px;border-radius:4px;cursor:pointer;
    border:1px solid var(--rule);background:transparent;color:var(--muted);
  }
  .btn:hover{color:var(--paper);border-color:var(--tide)}
  .btn.primary{background:var(--tide);border-color:var(--tide);color:var(--bg);font-weight:500}

  :focus-visible{outline:2px solid var(--tide);outline-offset:2px}
</style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <div class="brand">Heavenly <span>Layers</span></div>
    <div class="nav-links">
      <a href="#metrics">Metrics</a>
      <a href="#charts">Charts</a>
    </div>
  </div>
</nav>

<header class="hero">
  <div class="wrap">
    <h1>Heavenly <span>Layers</span></h1>
    <p>Sales dashboard for the bakery — 20 orders, 7 months, 6 products.</p>
  </div>
</header>

<main>
  <section id="metrics">
    <div class="wrap">
      <h2>Key metrics</h2>
      <div class="kpis" id="kpis"></div>
    </div>
  </section>

  <section id="charts">
    <div class="wrap">
      <h2>Charts</h2>
      <div class="charts">
        <div class="panel wide">
          <div class="panel-head">
            <h3>Monthly Sales</h3>
            <button class="inspect" onclick="openModal('line')">Inspect</button>
          </div>
          <div class="chart-host" id="chart-line"></div>
        </div>
        <div class="panel">
          <div class="panel-head">
            <h3>Product Wise Sales</h3>
            <button class="inspect" onclick="openModal('pie')">Inspect</button>
          </div>
          <div class="chart-host" id="chart-pie"></div>
        </div>
        <div class="panel">
          <div class="panel-head">
            <h3>Quantity Sold</h3>
            <button class="inspect" onclick="openModal('bar')">Inspect</button>
          </div>
          <div class="chart-host" id="chart-bar"></div>
        </div>
      </div>
    </div>
  </section>

  <footer>
    <div class="wrap">Heavenly Layers · Business Intelligence Project</div>
  </footer>
</main>

<div class="modal-back" id="modal" role="dialog" aria-modal="true" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <header>
      <h3 id="modal-title">Inspect</h3>
      <button class="x" onclick="closeModal()" aria-label="Close">✕</button>
    </header>
    <div class="modal-body">
      <div class="tabs" id="tabs">
        <button class="tab active" data-pane="data">Data</button>
        <button class="tab" data-pane="formula">Formula</button>
        <button class="tab" data-pane="edit">Edit</button>
      </div>
      <div class="pane active" id="pane-data"></div>
      <div class="pane" id="pane-formula"></div>
      <div class="pane" id="pane-edit"></div>
      <div class="actions">
        <button class="btn" onclick="resetData()">Reset data</button>
        <button class="btn primary" onclick="closeModal()">Close</button>
      </div>
    </div>
  </div>
</div>

<script>
const ORIGINAL = [
  [101,"Jan", "Chocolate cake","Cake",        5,2500],
  [102,"Jan", "Donut box",     "Donut",       8,1200],
  [103,"Jan", "Cookies",       "Snacks",     10, 500],
  [104,"Feb", "Brownie",       "Dessert",     6, 900],
  [105,"Feb", "Bread",         "Bakery item",15, 250],
  [106,"Feb", "Pastry",        "Pastry",      9, 700],
  [107,"Mar", "Chocolate cake","Cake",        7,2500],
  [108,"Mar", "Donut box",     "Donut",      12,1200],
  [109,"Mar", "Cookies",       "Snacks",     11, 500],
  [110,"Apr", "Brownie",       "Dessert",     8, 900],
  [111,"Apr", "Bread",         "Bakery item",18, 250],
  [112,"Apr", "Pastry",        "Dessert",    10, 700],
  [113,"May", "Chocolate cake","Cake",        9,2500],
  [114,"May", "Donut box",     "Donut",      14,1200],
  [115,"May", "Cookies",       "Snacks",     13, 500],
  [116,"Jun", "Brownie",       "Dessert",    10, 900],
  [117,"Jun", "Bread",         "Bakery item",20, 250],
  [118,"Jun", "Pastry",        "Dessert",    12, 700],
  [119,"July","Chocolate cake","Cake",       11,2500],
  [120,"July","Donut box",     "Donut",      15,1200],
].map(r=>({id:r[0],month:r[1],product:r[2],category:r[3],qty:r[4],price:r[5]}));

let ROWS = clone(ORIGINAL);
function clone(a){return a.map(r=>({...r}))}

const total = r => r.qty * r.price;
const SUM   = (arr,sel)=>arr.reduce((s,r)=>s+sel(r),0);
const AVG   = (arr,sel)=>arr.length?SUM(arr,sel)/arr.length:0;
const MAX   = (arr,sel)=>arr.reduce((m,r)=>Math.max(m,sel(r)),-Infinity);
const MIN   = (arr,sel)=>arr.reduce((m,r)=>Math.min(m,sel(r)),+Infinity);

const fmt  = n=>n.toLocaleString("en-US",{maximumFractionDigits:2});
const fmt0 = n=>Math.round(n).toLocaleString("en-US");

function metrics(){
  return {
    totalSales:SUM(ROWS,total),
    avgSale:AVG(ROWS,total),
    maxSale:MAX(ROWS,total),
    minSale:MIN(ROWS,total),
    totalQty:SUM(ROWS,r=>r.qty),
    orderCount:ROWS.length,
  };
}

const KPI_DEFS = [
  {key:"totalSales", label:"Total Sales",         cur:true,  formula:"SUM(Rawdata!G2:G21)"},
  {key:"avgSale",    label:"Average Sales",       cur:true,  formula:"AVERAGE(Rawdata!G2:G21)"},
  {key:"maxSale",    label:"Highest Sales",       cur:true,  formula:"MAX(Rawdata!G2:G21)"},
  {key:"minSale",    label:"Lower Sales",         cur:true,  formula:"MIN(Rawdata!G2:G21)"},
  {key:"totalQty",   label:"Total Quantity",      cur:false, formula:"SUM(Rawdata!E2:E21)"},
  {key:"orderCount", label:"Orders",              cur:false, formula:"COUNT(Rawdata!A2:A21)"},
];

function renderKPI(){
  const m = metrics();
  document.getElementById("kpis").innerHTML = KPI_DEFS.map(d=>`
    <div class="kpi">
      <div class="lbl">${d.label}</div>
      <div class="val">${d.cur?"₨ ":""}${d.cur?fmt0(m[d.key]):m[d.key]}</div>
    </div>`).join("");
}

const PRODUCT_COLORS = {
  "Chocolate cake":"#5cc2d6","Donut box":"#3aa5bd","Cookies":"#7fd7e6",
  "Brownie":"#246a82","Bread":"#a8e0ea","Pastry":"#155269",
};
const baseTheme = {
  chart:{foreColor:"#8a9aa8",fontFamily:'"Poppins",sans-serif',toolbar:{show:false},animations:{enabled:true,easing:"easeinout",speed:600}},
  grid:{borderColor:"rgba(232,237,241,.07)",strokeDashArray:2},
  tooltip:{theme:"dark",style:{fontFamily:'"Poppins",sans-serif'}},
};
let lineChart,pieChart,barChart;

function renderCharts(){
  const monthCats   = ROWS.map(r=>r.month);
  const lineVals    = ROWS.map(r=>total(r));
  const productCats = ROWS.map(r=>r.product);
  const pieVals     = ROWS.map(r=>total(r));
  const barVals     = ROWS.map(r=>r.qty);
  const rowColors   = ROWS.map(r=>PRODUCT_COLORS[r.product]);

  const lineOpts={
    ...baseTheme,
    series:[{name:"Total",data:lineVals}],
    chart:{...baseTheme.chart,type:"line",height:340},
    stroke:{curve:"straight",width:2.5,colors:["#5cc2d6"]},
    markers:{size:4,colors:["#06131f"],strokeColors:"#5cc2d6",strokeWidth:2,hover:{size:6}},
    xaxis:{categories:monthCats,labels:{style:{colors:"#8a9aa8",fontSize:"11px"},rotate:-45,rotateAlways:true}},
    yaxis:{labels:{style:{colors:"#8a9aa8"},formatter:v=>fmt0(v)}},
    dataLabels:{enabled:false},
    tooltip:{...baseTheme.tooltip,
      x:{formatter:(_,o)=>{const r=ROWS[o.dataPointIndex];return r?`#${r.id} · ${r.month} · ${r.product}`:""}},
      y:{formatter:v=>"₨ "+fmt0(v)}},
  };

  const pieOpts={
    ...baseTheme,
    series:pieVals,
    labels:ROWS.map(r=>`#${r.id} ${r.product}`),
    chart:{...baseTheme.chart,type:"pie",height:360},
    colors:rowColors,
    stroke:{colors:["#0a1d2e"],width:1.5},
    dataLabels:{enabled:false},
    legend:{position:"bottom",labels:{colors:"#8a9aa8"},fontSize:"11px",markers:{size:6},itemMargin:{horizontal:6,vertical:2}},
    tooltip:{...baseTheme.tooltip,y:{formatter:v=>"₨ "+fmt0(v)}},
  };

  const barOpts={
    ...baseTheme,
    series:[{name:"Quantity",data:barVals}],
    chart:{...baseTheme.chart,type:"bar",height:360},
    plotOptions:{bar:{borderRadius:3,columnWidth:"60%",distributed:true}},
    colors:rowColors,
    dataLabels:{enabled:false},
    xaxis:{categories:productCats,labels:{style:{colors:"#8a9aa8",fontSize:"10px"},rotate:-55,rotateAlways:true,trim:false}},
    yaxis:{labels:{style:{colors:"#8a9aa8"}}},
    legend:{show:false},
    tooltip:{...baseTheme.tooltip,
      x:{formatter:(_,o)=>{const r=ROWS[o.dataPointIndex];return r?`#${r.id} · ${r.month} · ${r.product}`:""}},
      y:{formatter:v=>fmt0(v)+" units"}},
  };

  if(!lineChart){
    lineChart=new ApexCharts(document.getElementById("chart-line"),lineOpts); lineChart.render();
    pieChart =new ApexCharts(document.getElementById("chart-pie"), pieOpts);  pieChart.render();
    barChart =new ApexCharts(document.getElementById("chart-bar"), barOpts);  barChart.render();
  }else{
    lineChart.updateOptions({series:[{name:"Total",data:lineVals}],xaxis:{categories:monthCats}});
    pieChart.updateOptions({series:pieVals,labels:ROWS.map(r=>`#${r.id} ${r.product}`),colors:rowColors});
    barChart.updateOptions({series:[{name:"Quantity",data:barVals}],xaxis:{categories:productCats},colors:rowColors});
  }
}

let CURRENT=null;
const TITLES={
  line:"Monthly Sales",
  pie :"Product Wise Sales",
  bar :"Quantity Sold",
};
function openModal(kind){
  CURRENT=kind;
  document.getElementById("modal-title").textContent=TITLES[kind];
  document.getElementById("modal").classList.add("open");
  document.body.style.overflow="hidden";
  switchTab("data"); renderPanes();
}
function closeModal(){document.getElementById("modal").classList.remove("open");document.body.style.overflow=""}
document.addEventListener("keydown",e=>{if(e.key==="Escape")closeModal()});
document.getElementById("tabs").addEventListener("click",e=>{if(e.target.matches(".tab"))switchTab(e.target.dataset.pane)});
function switchTab(p){
  document.querySelectorAll(".tab").forEach(t=>t.classList.toggle("active",t.dataset.pane===p));
  document.querySelectorAll(".pane").forEach(x=>x.classList.toggle("active",x.id==="pane-"+p));
}
function renderPanes(){
  document.getElementById("pane-data").innerHTML   =paneData(CURRENT);
  document.getElementById("pane-formula").innerHTML=paneFormula(CURRENT);
  document.getElementById("pane-edit").innerHTML   =paneEdit();
  bindEdits();
}

function paneData(kind){
  if(kind==="line"){
    return `<table class="data"><thead><tr><th>Order</th><th>Month</th><th>Product</th><th style="text-align:right">Total</th></tr></thead><tbody>
      ${ROWS.map(r=>`<tr><td>${r.id}</td><td>${r.month}</td><td>${r.product}</td><td class="num">₨ ${fmt0(total(r))}</td></tr>`).join("")}
      <tr><td colspan="3" style="color:var(--muted)">Sum</td><td class="num"><b>₨ ${fmt0(SUM(ROWS,total))}</b></td></tr>
    </tbody></table>`;
  }
  if(kind==="pie"){
    const tot=SUM(ROWS,total);
    return `<table class="data"><thead><tr><th>Order</th><th>Product</th><th style="text-align:right">Total</th><th style="text-align:right">Share</th></tr></thead><tbody>
      ${ROWS.map(r=>`<tr><td>${r.id}</td><td>${r.product}</td><td class="num">₨ ${fmt0(total(r))}</td><td class="num">${(total(r)/tot*100).toFixed(1)}%</td></tr>`).join("")}
    </tbody></table>`;
  }
  if(kind==="bar"){
    return `<table class="data"><thead><tr><th>Order</th><th>Product</th><th style="text-align:right">Quantity</th></tr></thead><tbody>
      ${ROWS.map(r=>`<tr><td>${r.id}</td><td>${r.product}</td><td class="num">${r.qty}</td></tr>`).join("")}
      <tr><td colspan="2" style="color:var(--muted)">Sum</td><td class="num"><b>${SUM(ROWS,r=>r.qty)}</b></td></tr>
    </tbody></table>`;
  }
}

function paneFormula(kind){
  if(kind==="line"){
    return `<div class="formula"><b>Chart</b>      = Line
<b>Title</b>      = "Monthly Sales Chart"
<b>Values</b>     = <span class="res">Rawdata!G2:G21</span>
<b>Categories</b> = <span class="res">Rawdata!B2:B21</span>   // Month

Each point plots one order's Total = Quantity × Price.
<b>Σ G2:G21</b> = <span class="res">₨ ${fmt0(SUM(ROWS,total))}</span></div>`;
  }
  if(kind==="pie"){
    return `<div class="formula"><b>Chart</b>      = Pie
<b>Title</b>      = "Product Wise Sales Pie Chart"
<b>Values</b>     = <span class="res">Rawdata!G2:G21</span>
<b>Labels</b>     = <span class="res">Rawdata!C2:C21</span>   // Product

One slice per order, sized by Total.
<b>Σ slices</b> = <span class="res">₨ ${fmt0(SUM(ROWS,total))}</span></div>`;
  }
  if(kind==="bar"){
    return `<div class="formula"><b>Chart</b>      = Bar
<b>Title</b>      = "Quantity Sold Chart"
<b>Values</b>     = <span class="res">Rawdata!E2:E21</span>
<b>Categories</b> = <span class="res">Rawdata!C2:C21</span>   // Product

One bar per order, height = Quantity.
<b>Σ E2:E21</b> = <span class="res">${SUM(ROWS,r=>r.qty)}</span></div>`;
  }
}

function paneEdit(){
  return `<p style="color:var(--muted);font-size:13px;margin:0 0 12px">Edit Quantity or Price — totals and charts update live.</p>
  <div style="max-height:48vh;overflow:auto;border:1px solid var(--rule);border-radius:4px">
  <table class="data">
    <thead><tr><th>ID</th><th>Month</th><th>Product</th><th style="text-align:right">Qty</th><th style="text-align:right">Price</th><th style="text-align:right">Total</th></tr></thead>
    <tbody>
    ${ROWS.map((r,i)=>`<tr>
      <td>${r.id}</td><td>${r.month}</td><td>${r.product}</td>
      <td class="num"><input type="number" min="0" step="1" data-i="${i}" data-k="qty"   value="${r.qty}"></td>
      <td class="num"><input type="number" min="0" step="1" data-i="${i}" data-k="price" value="${r.price}"></td>
      <td class="num" data-total="${i}">₨ ${fmt0(total(r))}</td>
    </tr>`).join("")}
    </tbody></table></div>`;
}
function bindEdits(){
  document.querySelectorAll('#pane-edit input').forEach(inp=>{
    inp.addEventListener("input",()=>{
      const i=+inp.dataset.i,k=inp.dataset.k,v=Math.max(0,+inp.value||0);
      ROWS[i][k]=v;
      document.querySelector(`[data-total="${i}"]`).textContent="₨ "+fmt0(total(ROWS[i]));
      renderKPI(); renderCharts();
      document.getElementById("pane-data").innerHTML=paneData(CURRENT);
      document.getElementById("pane-formula").innerHTML=paneFormula(CURRENT);
    });
  });
}
function resetData(){ROWS=clone(ORIGINAL);renderKPI();renderCharts();renderPanes()}
